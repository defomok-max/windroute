/* ──────── Accounts ──────── */
PAGES.accounts = {
  title: 'Accounts',
  sub: 'Windsurf token pool — load-balanced across requests.',
  async render() {
    const content = $('#content');
    $('#page-actions').innerHTML = '';
    $('#page-actions').appendChild(h('div', { class: 'row gap-8' },
      h('button', { class: 'btn btn-outline btn-sm', onClick: async () => {
        try { await api.post('/accounts/refresh-credits'); toast('Refreshing credits'); setTimeout(draw, 1500); }
        catch (e) { toast('Failed', { sub: e.message, kind: 'error' }); }
      } }, 'Refresh credits'),
      h('button', { class: 'btn btn-outline btn-sm', onClick: async () => {
        try { await api.post('/accounts/probe-all'); toast('Probing all accounts'); setTimeout(draw, 1000); }
        catch (e) { toast('Failed', { sub: e.message, kind: 'error' }); }
      } }, 'Probe all'),
      h('button', { class: 'btn btn-sm', onClick: openAddAccount }, '+ Add account'),
    ));

    const root = h('div', {});
    content.appendChild(root);

    async function draw() {
      const data = await api.get('/accounts');
      root.innerHTML = '';
      if (!data.accounts || !data.accounts.length) {
        root.appendChild(h('div', { class: 'section' }, h('div', { class: 'section-body' }, h('div', { class: 'table-empty' },
          h('div', { class: 'table-empty-icon' }, '👤'),
          h('div', { style: { fontSize: '14px', fontWeight: '500', color: 'var(--text)', marginBottom: '4px' } }, 'No accounts yet'),
          h('div', {}, 'Add a Windsurf token to start serving requests.'),
          h('button', { class: 'btn mt-12', onClick: openAddAccount }, '+ Add account')))));
        return;
      }
      root.appendChild(h('div', { class: 'section' },
        h('div', { class: 'section-body pad-0' },
          h('table', { class: 'table' },
            h('thead', {}, h('tr', {},
              h('th', {}, 'Label / Email'),
              h('th', {}, 'Status'),
              h('th', {}, 'Tier'),
              h('th', {}, 'RPM'),
              h('th', {}, 'Credits / Quota'),
              h('th', {}, 'Method'),
              h('th', {}, 'Added'),
              h('th', {}, ''))),
            h('tbody', {}, ...data.accounts.map(a => renderRow(a, draw)))))));
    }

    function renderRow(a, refresh) {
      const statusBadge = a.status === 'active' ? h('span', { class: 'badge ok' }, 'active')
        : a.status === 'error' ? h('span', { class: 'badge error' }, `error (${a.errorCount})`)
        : a.status === 'disabled' ? h('span', { class: 'badge' }, 'disabled')
        : h('span', { class: 'badge warn' }, a.status);
      const rpm = a.rpmLimit > 0 ? `${a.rpmUsed}/${a.rpmLimit}` : '—';
      const quota = a.credits?.percent != null ? `${Math.round(a.credits.percent)}%` :
                   a.credits?.prompt?.remaining != null ? fmtNumber(a.credits.prompt.remaining) : '—';
      return h('tr', {},
        h('td', {},
          h('div', {}, esc(a.email)),
          h('div', { class: 'text-xs text-dim mono' }, a.id + ' · ' + a.keyPrefix)),
        h('td', {}, statusBadge, a.rateLimited ? h('span', { class: 'badge warn', style: { marginLeft: '6px' } }, 'rate-limited') : null),
        h('td', {},
          h('span', { class: 'badge ' + (a.tier === 'pro' ? 'accent' : a.tier === 'free' ? 'info' : a.tier === 'expired' ? 'error' : '') }, a.tier || 'unknown')),
        h('td', { class: 'mono text-xs' }, rpm),
        h('td', {},
          h('span', {}, quota),
          a.credits?.planName ? h('div', { class: 'text-xs text-dim' }, a.credits.planName) : null),
        h('td', { class: 'text-xs text-muted' }, a.method),
        h('td', { class: 'text-xs text-dim' }, fmtTime(a.addedAt)),
        h('td', {},
          h('div', { class: 'row gap-4' },
            h('button', { class: 'btn btn-ghost btn-xs', title: 'Edit', onClick: () => openEditAccount(a, refresh) }, 'Edit'),
            h('button', { class: 'btn btn-ghost btn-xs', title: 'Probe', onClick: async () => {
              try { toast('Probing ' + a.email); await api.post(`/accounts/${a.id}/probe`); setTimeout(refresh, 800); }
              catch (e) { toast('Failed', { sub: e.message, kind: 'error' }); }
            } }, 'Probe'),
            h('button', { class: 'btn btn-ghost btn-xs', title: 'Delete', style: { color: 'var(--error)' }, onClick: async () => {
              if (!await confirmDialog({ title: 'Remove account?', message: `${a.email} will be removed from the pool. You can re-add it later with the same token.`, confirmLabel: 'Remove' })) return;
              await api.del(`/accounts/${a.id}`);
              toast('Account removed');
              refresh();
            } }, 'Delete'))),
      );
    }

    function openAddAccount() { addAccountModal(draw); }

    function openEditAccount(a, refresh) {
      const labelEl = h('input', { class: 'input' });
      labelEl.value = a.email;

      // Per-account blocked-models state. Mutating this in-place avoids
      // a network round-trip per chip click — we flush once on Save.
      const blocked = new Set(a.blockedModels || []);
      // Catalog = available ∪ blocked; we render all of them so a blocked
      // model can be un-blocked even if the tier currently excludes it.
      const allKnown = Array.from(new Set([...(a.availableModels || []), ...(a.blockedModels || [])]));
      allKnown.sort();

      const chipsEl = h('div', { class: 'chips', style: { maxHeight: '220px', overflowY: 'auto' } });
      const countEl = h('span', { class: 'mono', style: { color: 'var(--text-dim)' } });
      const renderChips = () => {
        chipsEl.innerHTML = '';
        countEl.textContent = `(${blocked.size} blocked / ${allKnown.length} total)`;
        for (const m of allKnown) {
          const isBlocked = blocked.has(m);
          chipsEl.appendChild(h('span', {
            class: 'chip ' + (isBlocked ? 'blocked' : 'selected'),
            title: isBlocked ? 'click to unblock' : 'click to block',
            onClick: () => {
              if (isBlocked) blocked.delete(m); else blocked.add(m);
              renderChips();
            },
          }, m));
        }
      };
      renderChips();

      openModal({
        title: `Edit ${a.email}`,
        width: 'wide',
        body: h('div', {},
          h('div', { class: 'field' },
            h('label', { class: 'field-label' }, 'Label'),
            labelEl),
          h('div', { class: 'field' },
            h('label', { class: 'field-label' }, 'Actions'),
            h('div', { class: 'row gap-8', style: { flexWrap: 'wrap' } },
              h('button', { class: 'btn btn-outline btn-sm', onClick: async () => {
                await api.patch(`/accounts/${a.id}`, { status: a.status === 'active' ? 'disabled' : 'active' });
                toast(a.status === 'active' ? 'Disabled' : 'Enabled');
                refresh();
              } }, a.status === 'active' ? 'Disable' : 'Enable'),
              h('button', { class: 'btn btn-outline btn-sm', onClick: async () => {
                await api.patch(`/accounts/${a.id}`, { resetErrors: true });
                toast('Errors reset'); refresh();
              } }, 'Reset errors'),
              h('button', { class: 'btn btn-outline btn-sm', onClick: async () => {
                try {
                  const r = await api.post(`/accounts/${a.id}/probe`);
                  toast(`Probed: ${r.tier || 'unknown'}`); refresh();
                } catch (e) { toast('Probe failed', { sub: e.message, kind: 'error' }); }
              } }, 'Probe tier'),
              h('button', { class: 'btn btn-outline btn-sm', onClick: async () => {
                try {
                  const r = await api.post(`/accounts/${a.id}/refresh-credits`);
                  if (r.ok === false) throw new Error(r.error || 'refresh failed');
                  toast('Credits refreshed'); refresh();
                } catch (e) { toast('Failed', { sub: e.message, kind: 'error' }); }
              } }, 'Refresh credits'),
              h('button', { class: 'btn btn-outline btn-sm', onClick: async () => {
                try {
                  const r = await api.post(`/accounts/${a.id}/refresh-token`);
                  if (!r.success) throw new Error(r.error || 'refresh failed');
                  toast(r.keyChanged ? 'API key rotated' : 'idToken refreshed');
                  refresh();
                } catch (e) {
                  toast('Token refresh failed', { sub: e.message, kind: 'error' });
                }
              }, title: 'Use the stored refresh_token to mint a fresh idToken + apiKey' }, 'Rotate token'),
              h('button', { class: 'btn btn-outline btn-sm', onClick: async () => {
                try {
                  const r = await api.post(`/accounts/${a.id}/rate-limit`);
                  if (r.error) throw new Error(r.error);
                  toast(`Rate limit OK (${r.remaining ?? '?'} left)`);
                } catch (e) { toast('Rate-limit check failed', { sub: e.message, kind: 'error' }); }
              } }, 'Check rate limit'))),
          h('div', { class: 'field' },
            h('label', { class: 'field-label' },
              'Blocked models ', countEl),
            h('div', { class: 'field-hint', style: { marginBottom: '8px' } },
              'Click a model to toggle. Blocked models won\'t be routed to this account.'),
            chipsEl)),
        actions: [
          { label: 'Close', kind: 'secondary' },
          { label: 'Save', onClick: async () => {
            const label = labelEl.value.trim();
            if (!label) { toast('Label cannot be empty', { kind: 'warn' }); return false; }
            await api.patch(`/accounts/${a.id}`, {
              label,
              blockedModels: Array.from(blocked),
            });
            toast('Saved');
            refresh();
          } }],
      });
    }

    await draw();
  },
};

/* ──────── Models ──────── */
PAGES.models = {
  title: 'Models',
  sub: 'Allowlist or blocklist which models clients can call.',
  async render() {
    const content = $('#content');
    $('#page-actions').innerHTML = '';
    $('#page-actions').appendChild(
      h('button', { class: 'btn btn-outline btn-sm', onClick: async () => {
        try { const r = await api.post('/models/refresh-catalog'); toast('Catalog: ' + r.added + ' new'); draw(); }
        catch (e) { toast('Failed', { sub: e.message, kind: 'error' }); }
      } }, 'Refresh catalog'));

    const root = h('div', {});
    content.appendChild(root);

    async function draw() {
      const [models, access] = await Promise.all([api.get('/models'), api.get('/model-access')]);
      root.innerHTML = '';

      const modeEl = h('select', { class: 'select', style: { maxWidth: '220px' } },
        h('option', { value: 'all' }, 'All models allowed'),
        h('option', { value: 'allowlist' }, 'Allowlist — listed only'),
        h('option', { value: 'blocklist' }, 'Blocklist — deny listed'));
      modeEl.value = access.mode;
      modeEl.addEventListener('change', async () => {
        await api.put('/model-access', { mode: modeEl.value });
        toast('Mode: ' + modeEl.value);
        draw();
      });

      root.appendChild(h('div', { class: 'section' },
        h('div', { class: 'section-header' },
          h('div', {}, h('div', { class: 'section-title' }, 'Access control'),
            h('div', { class: 'section-sub' }, `${(access.list || []).length} model(s) in the list`)),
          h('div', { class: 'row gap-8' },
            modeEl)),
        h('div', { class: 'section-body' },
          h('div', { class: 'field-label' }, 'Current list (click to remove)'),
          h('div', { class: 'chips' }, ...((access.list || []).length
            ? access.list.map(m => h('span', { class: 'chip selected', onClick: async () => {
                await api.post('/model-access/remove', { model: m });
                toast('Removed'); draw();
              } }, m, h('span', { style: { marginLeft: '4px' } }, '×')))
            : [h('span', { class: 'text-dim text-sm' }, 'list is empty')])))));

      // Group models by provider
      const grouped = {};
      for (const m of models.models) {
        (grouped[m.provider] = grouped[m.provider] || []).push(m);
      }
      root.appendChild(h('div', { class: 'section' },
        h('div', { class: 'section-header' },
          h('div', {}, h('div', { class: 'section-title' }, `Catalog (${models.models.length})`),
            h('div', { class: 'section-sub' }, 'Click a model to toggle it in the access list'))),
        h('div', { class: 'section-body' },
          ...Object.entries(grouped).sort(([a],[b]) => a.localeCompare(b)).map(([prov, list]) =>
            h('div', { class: 'provider-group' },
              h('div', { class: 'provider-label' }, `${prov} · ${list.length}`),
              h('div', { class: 'chips' }, ...list.map(m => {
                const inList = (access.list || []).includes(m.id);
                return h('span', {
                  class: 'chip ' + (inList ? 'selected' : ''),
                  onClick: async () => {
                    try {
                      if (inList) await api.post('/model-access/remove', { model: m.id });
                      else await api.post('/model-access/add', { model: m.id });
                      draw();
                    } catch (e) { toast('Failed', { sub: e.message, kind: 'error' }); }
                  },
                }, m.id);
              })))))));
    }
    await draw();
  },
};

/* ──────── Usage ──────── */
PAGES.usage = {
  title: 'Usage',
  sub: 'Request counts, tokens, and per-model breakdown.',
  async render() {
    const content = $('#content');
    $('#page-actions').innerHTML = '';
    $('#page-actions').appendChild(h('div', { class: 'row gap-8' },
      h('a', { class: 'btn btn-outline btn-sm', href: '/dashboard/api/usage/export', onClick: (e) => {
        e.preventDefault();
        fetch('/dashboard/api/usage/export', { headers: { 'X-Dashboard-Password': api.token } })
          .then(r => r.blob()).then(b => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = 'windbu-usage-' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
          });
      } }, 'Export'),
      h('button', { class: 'btn btn-outline btn-sm', onClick: async () => {
        if (!await confirmDialog({ title: 'Reset usage?', message: 'All analytics will be cleared. Export first if you want a backup.', confirmLabel: 'Reset' })) return;
        await api.post('/usage/reset'); toast('Usage reset'); draw();
      } }, 'Reset')));

    const root = h('div', {});
    content.appendChild(root);

    async function draw() {
      const stats = await api.get('/stats');
      root.innerHTML = '';

      root.appendChild(h('div', { class: 'grid grid-4', style: { marginBottom: '18px' } },
        h('div', { class: 'card' }, h('div', { class: 'card-title' }, 'Requests'),
          h('div', { class: 'card-value' }, fmtNumber(stats.totalRequests))),
        h('div', { class: 'card' }, h('div', { class: 'card-title' }, 'Success'),
          h('div', { class: 'card-value' }, fmtNumber(stats.successCount)),
          h('div', { class: 'card-sub' }, stats.totalRequests > 0 ? ((stats.successCount / stats.totalRequests) * 100).toFixed(1) + '%' : '—')),
        h('div', { class: 'card' }, h('div', { class: 'card-title' }, 'Errors'),
          h('div', { class: 'card-value' }, fmtNumber(stats.errorCount))),
        h('div', { class: 'card' }, h('div', { class: 'card-title' }, 'Tokens'),
          h('div', { class: 'card-value' }, fmtNumber(stats.totalTokens || 0)),
          h('div', { class: 'card-sub' }, fmtNumber(stats.totalCredits || 0) + ' credits'))));

      // Day bars
      const days = Object.entries(stats.requestsByDay || {}).sort(([a],[b]) => a.localeCompare(b)).slice(-14);
      const maxReq = Math.max(1, ...days.map(([, v]) => v));
      root.appendChild(h('div', { class: 'section' },
        h('div', { class: 'section-header' },
          h('div', {}, h('div', { class: 'section-title' }, 'Requests per day'),
            h('div', { class: 'section-sub' }, 'Last 14 days'))),
        h('div', { class: 'section-body' },
          days.length === 0 ? h('div', { class: 'text-dim text-sm' }, 'No data yet — start sending requests') :
          h('div', { class: 'bar-chart' }, ...days.map(([day, n]) =>
            h('div', { class: 'bar-wrap', title: `${day}: ${n} requests` },
              h('div', { class: 'bar', style: { height: Math.max(2, (n / maxReq) * 100) + '%' } }),
              h('div', { class: 'bar-label' }, day.slice(5))))))));

      // Per-model breakdown
      const entries = Object.entries(stats.modelCounts || {})
        .filter(([, v]) => v.requests > 0)
        .sort(([, a], [, b]) => b.requests - a.requests);
      root.appendChild(h('div', { class: 'section' },
        h('div', { class: 'section-header' },
          h('div', {}, h('div', { class: 'section-title' }, 'By model'))),
        h('div', { class: 'section-body pad-0' },
          entries.length === 0
            ? h('div', { class: 'table-empty' }, h('div', { class: 'table-empty-icon' }, '📊'), 'No requests yet')
            : h('table', { class: 'table' },
              h('thead', {}, h('tr', {},
                h('th', {}, 'Model'), h('th', {}, 'Requests'), h('th', {}, 'Success'),
                h('th', {}, 'Errors'), h('th', {}, 'Tokens'), h('th', {}, 'Credits'))),
              h('tbody', {}, ...entries.map(([m, v]) => h('tr', {},
                h('td', { class: 'mono text-sm' }, m),
                h('td', {}, fmtNumber(v.requests)),
                h('td', {}, fmtNumber(v.success)),
                h('td', {}, v.errors > 0 ? h('span', { style: { color: 'var(--error)' } }, fmtNumber(v.errors)) : '0'),
                h('td', {}, fmtNumber(v.totalTokens || 0)),
                h('td', {}, fmtNumber(v.totalCredits || 0)),
              )))))));
    }
    await draw();
  },
};

/* ──────── Proxies ──────── */
PAGES.proxy = {
  title: 'Proxies',
  sub: 'HTTP/SOCKS proxies for outbound Windsurf traffic.',
  async render() {
    const content = $('#content');
    const root = h('div', {});
    content.appendChild(root);

    async function draw() {
      const [proxy, accts] = await Promise.all([api.get('/proxy'), api.get('/accounts')]);
      root.innerHTML = '';

      const gHost = h('input', { class: 'input', placeholder: 'host.example.com' });
      const gPort = h('input', { class: 'input', placeholder: '8080' });
      const gUser = h('input', { class: 'input', placeholder: '(optional)' });
      const gPass = h('input', { class: 'input', type: 'password', placeholder: '(optional)' });
      const gType = h('select', { class: 'select' },
        h('option', { value: 'http' }, 'HTTP'),
        h('option', { value: 'socks5' }, 'SOCKS5'));
      if (proxy.global) {
        gHost.value = proxy.global.host || '';
        gPort.value = proxy.global.port || '';
        gUser.value = proxy.global.username || '';
        gPass.value = proxy.global.password || '';
        gType.value = proxy.global.type || 'http';
      }
      root.appendChild(h('div', { class: 'section' },
        h('div', { class: 'section-header' },
          h('div', {}, h('div', { class: 'section-title' }, 'Global proxy'),
            h('div', { class: 'section-sub' }, 'Used when no per-account proxy is set. Blank = direct connection.'))),
        h('div', { class: 'section-body' },
          h('div', { class: 'grid grid-2' },
            h('div', { class: 'field' }, h('label', { class: 'field-label' }, 'Host'), gHost),
            h('div', { class: 'field' }, h('label', { class: 'field-label' }, 'Port'), gPort),
            h('div', { class: 'field' }, h('label', { class: 'field-label' }, 'Type'), gType),
            h('div', {}),
            h('div', { class: 'field' }, h('label', { class: 'field-label' }, 'Username'), gUser),
            h('div', { class: 'field' }, h('label', { class: 'field-label' }, 'Password'), gPass)),
          h('div', { class: 'row gap-8' },
            h('button', { class: 'btn btn-sm', onClick: async () => {
              await api.put('/proxy/global', { host: gHost.value, port: parseInt(gPort.value,10) || 8080, username: gUser.value, password: gPass.value, type: gType.value });
              toast('Global proxy saved'); draw();
            } }, 'Save'),
            h('button', { class: 'btn btn-outline btn-sm', onClick: async () => {
              await api.del('/proxy/global'); toast('Global proxy removed'); draw();
            } }, 'Remove')))));

      // Per-account
      root.appendChild(h('div', { class: 'section' },
        h('div', { class: 'section-header' },
          h('div', {}, h('div', { class: 'section-title' }, 'Per-account overrides'),
            h('div', { class: 'section-sub' }, 'Route each account through a different IP'))),
        h('div', { class: 'section-body pad-0' },
          h('table', { class: 'table' },
            h('thead', {}, h('tr', {}, h('th', {}, 'Account'), h('th', {}, 'Proxy'), h('th', {}, ''))),
            h('tbody', {}, ...(accts.accounts || []).map(a => {
              const p = proxy.perAccount?.[a.id];
              return h('tr', {},
                h('td', {}, esc(a.email), h('div', { class: 'text-xs text-dim mono' }, a.id)),
                h('td', { class: 'mono text-sm' }, p ? `${p.type || 'http'}://${p.host}:${p.port}` : h('span', { class: 'text-dim' }, 'global / none')),
                h('td', {},
                  h('div', { class: 'row gap-4' },
                    h('button', { class: 'btn btn-outline btn-xs', onClick: () => openPerAccount(a, p, draw) }, 'Configure'),
                    p ? h('button', { class: 'btn btn-ghost btn-xs', onClick: async () => {
                      await api.del(`/proxy/accounts/${a.id}`); toast('Proxy removed'); draw();
                    } }, 'Clear') : null)));
            }))))));
    }

    function openPerAccount(a, existing, refresh) {
      const host = h('input', { class: 'input' });
      const port = h('input', { class: 'input' });
      const user = h('input', { class: 'input' });
      const pw   = h('input', { class: 'input', type: 'password' });
      const type = h('select', { class: 'select' },
        h('option', { value: 'http' }, 'HTTP'),
        h('option', { value: 'socks5' }, 'SOCKS5'));
      if (existing) {
        host.value = existing.host || '';
        port.value = existing.port || '';
        user.value = existing.username || '';
        pw.value   = existing.password || '';
        type.value = existing.type || 'http';
      }
      openModal({
        title: `Proxy for ${a.email}`,
        body: h('div', { class: 'grid grid-2' },
          h('div', { class: 'field' }, h('label', { class: 'field-label' }, 'Host'), host),
          h('div', { class: 'field' }, h('label', { class: 'field-label' }, 'Port'), port),
          h('div', { class: 'field' }, h('label', { class: 'field-label' }, 'Type'), type),
          h('div', {}),
          h('div', { class: 'field' }, h('label', { class: 'field-label' }, 'Username'), user),
          h('div', { class: 'field' }, h('label', { class: 'field-label' }, 'Password'), pw)),
        actions: [
          { label: 'Cancel', kind: 'secondary' },
          { label: 'Save', onClick: async () => {
            await api.put(`/proxy/accounts/${a.id}`, {
              host: host.value.trim(), port: parseInt(port.value, 10) || 8080,
              username: user.value, password: pw.value, type: type.value,
            });
            toast('Proxy saved'); refresh();
          } }],
      });
    }

    await draw();
  },
};

/* ──────── Logs ──────── */
PAGES.logs = {
  title: 'Logs',
  sub: 'Live tail of gateway logs.',
  async render() {
    const content = $('#content');
    let paused = false;
    let level = 'all';
    $('#page-actions').innerHTML = '';
    const pauseBtn = h('button', { class: 'btn btn-outline btn-sm' });
    const updatePause = () => { pauseBtn.textContent = paused ? 'Resume' : 'Pause'; };
    updatePause();
    pauseBtn.addEventListener('click', () => { paused = !paused; updatePause(); });
    const levelEl = h('select', { class: 'select', style: { maxWidth: '120px' } },
      h('option', { value: 'all' }, 'All levels'),
      h('option', { value: 'debug' }, 'Debug+'),
      h('option', { value: 'info' }, 'Info+'),
      h('option', { value: 'warn' }, 'Warn+'),
      h('option', { value: 'error' }, 'Error'));
    levelEl.addEventListener('change', () => { level = levelEl.value; });
    $('#page-actions').appendChild(h('div', { class: 'row gap-8' },
      levelEl, pauseBtn,
      h('button', { class: 'btn btn-ghost btn-sm', onClick: () => { stream.innerHTML = ''; } }, 'Clear')));

    const stream = h('div', { class: 'log-stream' });
    content.appendChild(stream);

    const levelOrder = { debug: 0, info: 1, warn: 2, error: 3 };
    const shouldShow = (lvl) => level === 'all' || levelOrder[lvl] >= levelOrder[level];
    const render = (entry) => {
      if (!shouldShow(entry.level)) return;
      const line = h('div', { class: 'log-line' },
        h('span', { class: 'log-ts' }, new Date(entry.ts).toISOString().slice(11, 19)),
        h('span', { class: 'log-lvl ' + entry.level }, entry.level.toUpperCase()),
        h('span', { class: 'log-msg' }, entry.msg));
      stream.appendChild(line);
      while (stream.children.length > 500) stream.removeChild(stream.firstChild);
      if (!paused) stream.scrollTop = stream.scrollHeight;
    };

    // seed
    try {
      const existing = await api.get('/logs');
      for (const e of (existing.logs || []).slice(-100)) render(e);
    } catch (e) {
      // Don't kill the page — the SSE stream below still has a chance to
      // catch up. Surface a quiet toast so the user knows the buffer is
      // empty if it does end up empty.
      console.warn('Failed to seed log buffer:', e?.message || e);
    }

    // SSE stream with smart reconnect-aware status reporting.
    // Browsers already auto-reconnect to an EventSource (the server sends
    // `retry: 3000`); we only need to (a) avoid spamming the user with
    // toasts on every transient disconnect, and (b) warn loudly if the
    // stream stays down for more than a few seconds.
    let wasOpen = false;
    let disconnectWarnTimer = null;
    const es = new EventSource('/dashboard/api/logs/stream?_pw=' + encodeURIComponent(api.token));
    es.onopen = () => {
      if (wasOpen) toast('Log stream reconnected', { kind: 'ok', timeout: 1500 });
      wasOpen = true;
      clearTimeout(disconnectWarnTimer);
      disconnectWarnTimer = null;
    };
    es.onmessage = (ev) => {
      try { render(JSON.parse(ev.data)); }
      catch (err) { console.warn('Log stream: bad payload', err?.message, ev.data?.slice?.(0, 80)); }
    };
    es.onerror = () => {
      // Browser is reconnecting. Only warn if it stays down for >5s so a
      // burst of dropped packets doesn't flood the toast stack.
      if (es.readyState === EventSource.CLOSED) {
        toast('Log stream closed', { kind: 'warn' });
        return;
      }
      if (!disconnectWarnTimer) {
        disconnectWarnTimer = setTimeout(() => {
          toast('Log stream disconnected — still trying to reconnect…', { kind: 'warn' });
        }, 5000);
      }
    };
    App.logsStreamController = { close: () => { clearTimeout(disconnectWarnTimer); es.close(); } };
  },
};

/* ──────── Settings ──────── */
PAGES.settings = {
  title: 'Settings',
  sub: 'Dashboard password, experimental flags, and identity prompts.',
  async render() {
    const content = $('#content');
    const root = h('div', {});
    content.appendChild(root);

    async function draw() {
      const [cfg, exp, prompts, cache] = await Promise.all([
        api.get('/config'),
        api.get('/experimental'),
        api.get('/identity-prompts'),
        api.get('/cache').catch(() => ({})),
      ]);
      root.innerHTML = '';

      // System
      root.appendChild(h('div', { class: 'section' },
        h('div', { class: 'section-header' },
          h('div', {}, h('div', { class: 'section-title' }, 'System'))),
        h('div', { class: 'section-body' },
          h('div', { class: 'kv' }, h('span', {}, 'Port'), h('span', { class: 'mono' }, cfg.port)),
          h('div', { class: 'kv' }, h('span', {}, 'Default model'), h('span', { class: 'mono' }, cfg.defaultModel)),
          h('div', { class: 'kv' }, h('span', {}, 'Max tokens'), h('span', { class: 'mono' }, cfg.maxTokens)),
          h('div', { class: 'kv' }, h('span', {}, 'Log level'), h('span', { class: 'mono' }, cfg.logLevel)),
          h('div', { class: 'kv' }, h('span', {}, 'LS binary'), h('span', { class: 'mono text-xs' }, cfg.lsBinaryPath)),
          h('div', { class: 'kv' }, h('span', {}, 'Dashboard password'), h('span', {}, cfg.hasDashboardPassword ? 'set' : 'not set')),
          h('div', { class: 'kv' }, h('span', {}, 'API key required'), h('span', {}, cfg.hasApiKey ? 'yes' : 'no')))));

      // Experimental
      const expRows = Object.entries(exp.flags || {}).map(([k, v]) => {
        const toggle = h('input', { type: 'checkbox' });
        toggle.checked = !!v;
        toggle.addEventListener('change', async () => {
          await api.put('/experimental', { [k]: toggle.checked });
          toast(`${k}: ${toggle.checked ? 'on' : 'off'}`);
        });
        return h('div', { class: 'kv' },
          h('span', {}, h('div', {}, k), h('div', { class: 'text-xs text-dim' }, flagHint(k))),
          h('span', {}, toggle));
      });
      root.appendChild(h('div', { class: 'section' },
        h('div', { class: 'section-header' },
          h('div', {}, h('div', { class: 'section-title' }, 'Experimental features'),
            h('div', { class: 'section-sub' }, 'Opt-in flags that can be toggled at runtime'))),
        h('div', { class: 'section-body' }, ...expRows)));

      // Cache
      root.appendChild(h('div', { class: 'section' },
        h('div', { class: 'section-header' },
          h('div', {}, h('div', { class: 'section-title' }, 'Response cache'),
            h('div', { class: 'section-sub' }, `${cache.size || 0} / ${cache.maxSize || 0} entries · ${cache.hitRate || '0.0'}% hit rate`)),
          h('button', { class: 'btn btn-outline btn-sm', onClick: async () => {
            await api.del('/cache'); toast('Cache cleared'); draw();
          } }, 'Clear cache')),
        h('div', { class: 'section-body' },
          h('div', { class: 'grid grid-3' },
            h('div', {}, h('div', { class: 'card-title' }, 'Hits'), h('div', { class: 'card-value', style: { fontSize: '18px' } }, cache.hits || 0)),
            h('div', {}, h('div', { class: 'card-title' }, 'Misses'), h('div', { class: 'card-value', style: { fontSize: '18px' } }, cache.misses || 0)),
            h('div', {}, h('div', { class: 'card-title' }, 'Evictions'), h('div', { class: 'card-value', style: { fontSize: '18px' } }, cache.evictions || 0))))));

      // Identity prompts
      const promptsBody = h('div', {});
      for (const [prov, tpl] of Object.entries(prompts)) {
        const ta = h('textarea', { class: 'textarea', rows: 3 });
        ta.value = tpl;
        promptsBody.appendChild(h('div', { class: 'field' },
          h('label', { class: 'field-label' }, prov + ' · use {model} as placeholder'),
          ta,
          h('div', { class: 'row gap-8 mt-8' },
            h('button', { class: 'btn btn-outline btn-sm', onClick: async () => {
              await api.put('/identity-prompts', { [prov]: ta.value });
              toast('Saved ' + prov);
            } }, 'Save'),
            h('button', { class: 'btn btn-ghost btn-sm', onClick: async () => {
              await api.del('/identity-prompts', { provider: prov });
              toast('Reset ' + prov); draw();
            } }, 'Reset to default'))));
      }
      root.appendChild(h('div', { class: 'section' },
        h('div', { class: 'section-header' },
          h('div', {}, h('div', { class: 'section-title' }, 'Identity prompts'),
            h('div', { class: 'section-sub' }, 'Prepended system prompt that tells the model who it is. Keep enabled via the "modelIdentityPrompt" flag.'))),
        h('div', { class: 'section-body' }, promptsBody)));

      // Danger zone
      root.appendChild(h('div', { class: 'section' },
        h('div', { class: 'section-header' },
          h('div', {}, h('div', { class: 'section-title', style: { color: 'var(--error)' } }, 'Danger zone'))),
        h('div', { class: 'section-body' },
          h('div', { class: 'row', style: { justifyContent: 'space-between' } },
            h('div', {},
              h('div', { style: { fontWeight: 500 } }, 'Reset all usage analytics'),
              h('div', { class: 'text-xs text-dim' }, 'Clears stats.json. Accounts stay intact.')),
            h('button', { class: 'btn btn-danger btn-sm', onClick: async () => {
              if (!await confirmDialog({ title: 'Reset all usage?', message: 'This clears totals, per-model data, day buckets, and per-request details.', confirmLabel: 'Reset' })) return;
              await api.del('/stats'); toast('Reset'); draw();
            } }, 'Reset usage')),
          h('div', { class: 'divider' }),
          h('div', { class: 'row', style: { justifyContent: 'space-between' } },
            h('div', {},
              h('div', { style: { fontWeight: 500 } }, 'Clear conversation pool'),
              h('div', { class: 'text-xs text-dim' }, 'Drops cached cascade_id entries. Next turn will start fresh.')),
            h('button', { class: 'btn btn-outline btn-sm', onClick: async () => {
              const r = await api.del('/experimental/conversation-pool');
              toast(`Cleared ${r.cleared} entries`);
            } }, 'Clear pool')))));
    }

    function flagHint(k) {
      return ({
        cascadeConversationReuse: 'Reuse cascade_id across turns (~30% faster multi-turn).',
        modelIdentityPrompt:      'Tell the model its name via system prompt injection.',
        preflightRateLimit:       'Check server.codeium.com quota before each request (slower, safer).',
      })[k] || '';
    }

    await draw();
  },
};

/* ────────────────────────── boot ────────────────────────── */
App.boot();
</script>

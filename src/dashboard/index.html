<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>windbu — dashboard</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='18' font-size='18'%3E⚡%3C/text%3E%3C/svg%3E">
<style>
/* ──────────── design tokens ──────────── */
:root {
  --bg:           #0a0a0d;
  --bg-elev:      #0f0f13;
  --surface:      #14141a;
  --surface-2:    #1a1a22;
  --surface-3:    #212129;
  --border:       #2a2a33;
  --border-strong:#3a3a45;
  --text:         #f4f4f5;
  --text-muted:   #a1a1aa;
  --text-dim:     #71717a;
  --accent:       #6366f1;
  --accent-hover: #818cf8;
  --accent-soft:  rgba(99, 102, 241, .14);
  --success:      #22c55e;
  --success-soft: rgba(34, 197, 94, .14);
  --warn:         #f59e0b;
  --warn-soft:    rgba(245, 158, 11, .14);
  --error:        #ef4444;
  --error-soft:   rgba(239, 68, 68, .14);
  --info:         #3b82f6;
  --info-soft:    rgba(59, 130, 246, .14);
  --radius:       10px;
  --radius-sm:    6px;
  --radius-lg:    14px;
  --shadow:       0 2px 8px rgba(0,0,0,.3), 0 8px 32px rgba(0,0,0,.25);
  --sidebar-w:    240px;
  --header-h:     56px;
}

/* ──────────── reset ──────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Pro Display", "Inter", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input, select, textarea { font: inherit; color: inherit; }
code, pre, .mono { font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; font-size: 12.5px; }

/* ──────────── scrollbars ──────────── */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

/* ──────────── login / onboarding overlay ──────────── */
.overlay {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.card-center {
  width: 100%; max-width: 440px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px;
  box-shadow: var(--shadow);
}
.brand-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px;
}
.brand-mark {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 18px; color: white;
}
.brand-name { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
.brand-sub { color: var(--text-dim); font-size: 12px; margin-top: 1px; }
.login-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.login-desc { color: var(--text-muted); font-size: 13px; margin-bottom: 22px; }

/* ──────────── app shell ──────────── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* sidebar */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--bg-elev);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
}
.sidebar-head {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-nav {
  flex: 1; overflow-y: auto;
  padding: 10px 8px;
}
.nav-group { margin-bottom: 4px; }
.nav-group-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--text-dim);
  padding: 10px 10px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  cursor: pointer;
  user-select: none;
  font-size: 13.5px;
  transition: background .1s, color .1s;
}
.nav-item:hover { background: var(--surface); color: var(--text); }
.nav-item.active { background: var(--accent-soft); color: var(--accent-hover); }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: .85; }
.nav-badge {
  margin-left: auto;
  background: var(--surface-2);
  color: var(--text-muted);
  font-size: 10.5px;
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 500;
}
.nav-badge.warn { background: var(--warn-soft); color: var(--warn); }
.nav-badge.error { background: var(--error-soft); color: var(--error); }
.nav-badge.ok { background: var(--success-soft); color: var(--success); }

.sidebar-foot {
  padding: 10px 10px 14px;
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 11px;
}
.sidebar-foot .row {
  display: flex; justify-content: space-between;
  padding: 3px 6px;
}

/* main area */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  height: var(--header-h);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px;
  gap: 16px;
  background: var(--bg);
  flex-shrink: 0;
}
.topbar-title { font-size: 16px; font-weight: 600; }
.topbar-sub { color: var(--text-dim); font-size: 12px; }
.topbar-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

.content {
  flex: 1; overflow-y: auto;
  padding: 24px 28px 40px;
}

/* ──────────── common components ──────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  background: var(--accent);
  color: white;
  border-radius: var(--radius-sm);
  font-weight: 500;
  font-size: 13px;
  transition: background .12s, transform .05s;
  white-space: nowrap;
}
.btn:hover { background: var(--accent-hover); }
.btn:active { transform: translateY(1px); }
.btn[disabled] { opacity: .5; pointer-events: none; }
.btn-outline {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border-strong);
}
.btn-outline:hover { border-color: var(--text-muted); background: var(--surface); }
.btn-ghost { background: transparent; color: var(--text-muted); }
.btn-ghost:hover { background: var(--surface); color: var(--text); }
.btn-danger { background: var(--error); }
.btn-danger:hover { background: #dc2626; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-xs { padding: 3px 8px; font-size: 11.5px; }
.btn svg { width: 14px; height: 14px; }

.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
  background: var(--surface-2);
  color: var(--text-muted);
  white-space: nowrap;
}
.badge.ok      { background: var(--success-soft); color: var(--success); }
.badge.warn    { background: var(--warn-soft);    color: var(--warn); }
.badge.error   { background: var(--error-soft);   color: var(--error); }
.badge.info    { background: var(--info-soft);    color: var(--info); }
.badge.accent  { background: var(--accent-soft);  color: var(--accent-hover); }
.badge-dot {
  display: inline-block;
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor;
  margin-right: 2px;
}

.input, .select, .textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color .12s, background .12s;
}
.input:focus, .select:focus, .textarea:focus {
  border-color: var(--accent);
  background: var(--bg-elev);
}
.textarea { font-family: "SF Mono", "JetBrains Mono", monospace; font-size: 12px; resize: vertical; min-height: 80px; }
.input::placeholder { color: var(--text-dim); }
.field-label {
  display: block;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
  font-weight: 500;
}
.field-hint {
  font-size: 11.5px;
  color: var(--text-dim);
  margin-top: 4px;
}
.field { margin-bottom: 14px; }

/* cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}
.card.interactive:hover {
  border-color: var(--border-strong);
}
.card-title {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .05em;
  font-weight: 500;
  margin-bottom: 6px;
}
.card-value {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.card-sub {
  color: var(--text-dim);
  font-size: 11.5px;
  margin-top: 3px;
}

.grid { display: grid; gap: 14px; }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
@media (max-width: 1100px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 700px) {
  .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
}

/* section */
.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 18px;
  overflow: hidden;
}
.section-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between;
}
.section-title { font-size: 14px; font-weight: 600; }
.section-sub { color: var(--text-dim); font-size: 12px; margin-top: 2px; }
.section-body { padding: 16px 18px; }
.section-body.pad-0 { padding: 0; }

/* tables */
.table { width: 100%; border-collapse: collapse; font-size: 13px; }
.table th {
  text-align: left;
  color: var(--text-muted);
  font-weight: 500;
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: .05em;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
}
.table td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.table tr:last-child td { border-bottom: none; }
.table tr:hover td { background: var(--bg-elev); }
.table-empty {
  padding: 40px 16px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
}
.table-empty-icon {
  font-size: 24px;
  opacity: .5;
  margin-bottom: 10px;
}

/* modal */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(4px);
  z-index: 50;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity .15s;
}
.modal-backdrop.open { opacity: 1; pointer-events: auto; }
.modal {
  width: 100%; max-width: 500px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  transform: translateY(10px);
  transition: transform .15s;
  max-height: calc(100vh - 48px);
  display: flex; flex-direction: column;
}
.modal-backdrop.open .modal { transform: translateY(0); }
.modal.wide { max-width: 720px; }
.modal.tall { max-width: 560px; }
.modal-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 15px; font-weight: 600; }
.modal-body { padding: 18px 20px; overflow-y: auto; flex: 1; }
.modal-foot {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}
.modal-close {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim);
  border-radius: var(--radius-sm);
}
.modal-close:hover { background: var(--surface-2); color: var(--text); }

/* toast */
.toast-stack {
  position: fixed; top: 16px; right: 16px; z-index: 200;
  display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--surface-2);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 10px 14px;
  min-width: 260px;
  max-width: 400px;
  display: flex; align-items: flex-start; gap: 10px;
  box-shadow: var(--shadow);
  pointer-events: auto;
  animation: toast-in .2s ease-out;
}
@keyframes toast-in {
  from { opacity: 0; transform: translateX(10px); }
  to   { opacity: 1; transform: translateX(0); }
}
.toast.ok    { border-color: rgba(34, 197, 94, .4); }
.toast.warn  { border-color: rgba(245, 158, 11, .4); }
.toast.error { border-color: rgba(239, 68, 68, .4); }
.toast-icon { width: 16px; height: 16px; margin-top: 2px; flex-shrink: 0; }
.toast.ok    .toast-icon { color: var(--success); }
.toast.warn  .toast-icon { color: var(--warn); }
.toast.error .toast-icon { color: var(--error); }
.toast-body { font-size: 13px; line-height: 1.4; }
.toast-title { font-weight: 500; }
.toast-sub { color: var(--text-muted); font-size: 12px; margin-top: 1px; }

/* spinner */
.spinner {
  width: 14px; height: 14px;
  border: 2px solid currentColor;
  border-right-color: transparent;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* log viewer */
.log-stream {
  font-family: "SF Mono", "JetBrains Mono", monospace;
  font-size: 12px;
  line-height: 1.55;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  max-height: calc(100vh - 220px);
  overflow-y: auto;
  padding: 10px 12px;
}
.log-line {
  display: flex; gap: 10px;
  padding: 2px 6px;
  border-radius: 3px;
}
.log-line:hover { background: var(--surface); }
.log-ts { color: var(--text-dim); flex-shrink: 0; }
.log-lvl { flex-shrink: 0; font-weight: 600; width: 42px; }
.log-lvl.debug { color: var(--text-dim); }
.log-lvl.info  { color: var(--info); }
.log-lvl.warn  { color: var(--warn); }
.log-lvl.error { color: var(--error); }
.log-msg { word-break: break-word; }

/* usage chart */
.bar-chart {
  display: flex; align-items: flex-end; gap: 3px;
  height: 140px;
  padding: 10px 0;
  overflow-x: auto;
}
.bar-wrap {
  display: flex; flex-direction: column; align-items: center;
  flex: 1; min-width: 18px;
}
.bar {
  width: 100%;
  background: var(--accent);
  border-radius: 3px 3px 0 0;
  min-height: 2px;
  transition: background .15s;
}
.bar-wrap:hover .bar { background: var(--accent-hover); }
.bar-label {
  color: var(--text-dim);
  font-size: 10px;
  margin-top: 4px;
  white-space: nowrap;
}

/* misc */
.row { display: flex; align-items: center; gap: 10px; }
.row-split { display: flex; justify-content: space-between; align-items: center; }
.divider { height: 1px; background: var(--border); margin: 14px 0; }
.text-dim { color: var(--text-dim); }
.text-muted { color: var(--text-muted); }
.text-xs { font-size: 11.5px; }
.text-sm { font-size: 12.5px; }
.text-lg { font-size: 16px; }
.mb-0 { margin-bottom: 0; }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.flex-1 { flex: 1; }
.gap-4 { gap: 4px; }
.gap-8 { gap: 8px; }
.hidden { display: none !important; }

.kv {
  display: flex; justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.kv:last-child { border-bottom: none; }
.kv > :first-child { color: var(--text-muted); }
.kv > :last-child { color: var(--text); font-weight: 500; }

/* copy-hover */
.copyable {
  cursor: pointer;
  position: relative;
  transition: color .12s;
}
.copyable:hover { color: var(--accent-hover); }
.copyable::after {
  content: "copy";
  position: absolute;
  right: -3em; top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  color: var(--text-dim);
  opacity: 0;
  transition: opacity .12s;
}
.copyable:hover::after { opacity: 1; }

/* ──────────── model chips ──────────── */
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 11.5px;
  color: var(--text-muted);
  cursor: pointer;
  user-select: none;
}
.chip:hover { border-color: var(--border-strong); color: var(--text); }
.chip.selected { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-hover); }
.chip.blocked  { background: var(--error-soft);  border-color: rgba(239,68,68,.3); color: var(--error); text-decoration: line-through; }

/* provider group */
.provider-group { margin-bottom: 14px; }
.provider-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
  color: var(--text-dim);
  margin-bottom: 6px;
}

/* ──────────── segmented tabs (used in Add Account modal) ──────────── */
.tabs {
  display: flex;
  gap: 2px;
  background: var(--surface-2);
  padding: 3px;
  border-radius: var(--radius);
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.tab {
  flex: 1 1 auto;
  min-width: 0;
  padding: 7px 10px;
  font-size: 12.5px;
  text-align: center;
  color: var(--text-muted);
  background: transparent;
  border-radius: var(--radius-sm);
  cursor: pointer;
  user-select: none;
  transition: background .1s, color .1s;
  white-space: nowrap;
}
.tab:hover { color: var(--text); }
.tab.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 2px rgba(0,0,0,.2);
}

/* helper alert/info box (used in modal tabs to explain a flow) */
.alert-info {
  padding: 10px 12px;
  background: var(--info-soft);
  border: 1px solid rgba(59, 130, 246, .25);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 12.5px;
  line-height: 1.45;
  margin-bottom: 12px;
}
.alert-warn {
  padding: 10px 12px;
  background: var(--warn-soft);
  border: 1px solid rgba(245, 158, 11, .25);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 12.5px;
  line-height: 1.45;
  margin-bottom: 12px;
}
.alert-info code, .alert-warn code {
  background: rgba(255,255,255,.05);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 11.5px;
}

/* batch import result list */
.batch-result {
  display: flex; flex-direction: column; gap: 4px;
  max-height: 220px; overflow-y: auto;
  margin-top: 10px;
  padding: 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: "SF Mono", "JetBrains Mono", monospace;
  font-size: 11.5px;
}
.batch-result-row { display: flex; gap: 8px; align-items: center; }
.batch-result-row.ok    { color: var(--success); }
.batch-result-row.fail  { color: var(--error); }
.batch-result-row .bullet { width: 14px; flex-shrink: 0; }
</style>
</head>
<body>

<!-- login / onboarding overlay -->
<div id="overlay" class="overlay hidden">
  <div class="card-center" id="overlay-content"></div>
</div>

<!-- main app shell -->
<div class="app hidden" id="app">
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="brand-mark">w</div>
      <div>
        <div class="brand-name">windbu</div>
        <div class="brand-sub" id="brand-version">v—</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="nav"></nav>
    <div class="sidebar-foot">
      <div class="row"><span class="flex-1">Gateway</span><span id="foot-health">—</span></div>
      <div class="row"><span class="flex-1">Uptime</span><span id="foot-uptime">—</span></div>
      <div class="row"><span class="flex-1">Accounts</span><span id="foot-accounts">—</span></div>
      <div class="row" style="margin-top:6px"><button class="btn btn-ghost btn-xs" id="btn-logout" style="width:100%;justify-content:center">Log out</button></div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <div class="topbar-title" id="page-title">Overview</div>
        <div class="topbar-sub" id="page-sub"></div>
      </div>
      <div class="topbar-actions" id="page-actions"></div>
    </header>
    <section class="content" id="content"></section>
  </main>
</div>

<!-- modal root -->
<div id="modal-root"></div>
<div class="toast-stack" id="toasts"></div>

<script>
/* ────────────────────────── utils ────────────────────────── */
const $  = (q, root=document) => root.querySelector(q);
const $$ = (q, root=document) => [...root.querySelectorAll(q)];
const h  = (tag, attrs={}, ...children) => {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'class') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') el.innerHTML = v;
    else if (v === true) el.setAttribute(k, '');
    else if (v === false || v == null) {}
    else el.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    if (c instanceof Node) el.appendChild(c);
    else el.appendChild(document.createTextNode(String(c)));
  }
  return el;
};
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
const fmtNumber = (n) => {
  if (n == null || isNaN(n)) return '—';
  n = Number(n);
  if (n < 1000) return String(n);
  if (n < 1e6)  return (n/1e3).toFixed(n<1e4 ? 1 : 0) + 'K';
  if (n < 1e9)  return (n/1e6).toFixed(n<1e7 ? 1 : 0) + 'M';
  return (n/1e9).toFixed(1) + 'B';
};
const fmtUptime = (s) => {
  if (!s || s < 1) return '—';
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  if (d) return `${d}d ${h}h`;
  if (h) return `${h}h ${m}m`;
  return `${m}m`;
};
const fmtTime = (ts) => {
  if (!ts) return '—';
  const d = new Date(ts);
  if (isNaN(d.getTime())) return '—';
  const now = Date.now();
  const diff = Math.abs(now - d.getTime());
  if (diff < 60_000) return `${Math.round(diff/1000)}s ago`;
  if (diff < 3_600_000) return `${Math.round(diff/60_000)}m ago`;
  if (diff < 86_400_000) return `${Math.round(diff/3_600_000)}h ago`;
  return d.toISOString().slice(0, 10);
};

/* ────────────────────────── api client ────────────────────────── */
const api = {
  token: localStorage.getItem('windbu-dashboard-token') || '',
  async call(method, path, body) {
    const opts = {
      method,
      headers: {
        'X-Dashboard-Password': this.token,
      },
    };
    if (body !== undefined) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    const res = await fetch('/dashboard/api' + path, opts);
    const text = await res.text();
    let data;
    try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }
    if (!res.ok) {
      const err = new Error(data?.error || `HTTP ${res.status}`);
      err.status = res.status;
      err.data = data;
      throw err;
    }
    return data;
  },
  get: (p)       => api.call('GET', p),
  post: (p, b)   => api.call('POST', p, b ?? {}),
  put: (p, b)    => api.call('PUT', p, b ?? {}),
  patch: (p, b)  => api.call('PATCH', p, b ?? {}),
  del: (p, b)    => api.call('DELETE', p, b),
};

/* ────────────────────────── toast ────────────────────────── */
function toast(title, { sub, kind = 'ok', timeout = 3500 } = {}) {
  const icons = {
    ok:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    warn:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v2m0 4h.01"/><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>',
    error: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
  };
  const el = h('div', { class: 'toast ' + kind },
    h('div', { class: 'toast-icon', html: icons[kind] || icons.ok }),
    h('div', { class: 'toast-body' },
      h('div', { class: 'toast-title' }, title),
      sub ? h('div', { class: 'toast-sub' }, sub) : null));
  $('#toasts').appendChild(el);
  setTimeout(() => { el.style.opacity = 0; setTimeout(() => el.remove(), 200); }, timeout);
}
window.addEventListener('unhandledrejection', (e) => {
  console.error('unhandled', e.reason);
  toast('Something went wrong', { sub: String(e.reason?.message || e.reason || 'unknown'), kind: 'error' });
});

/* ────────────────────────── modal ────────────────────────── */
function openModal({ title, body, actions = [], width = 'default' }) {
  const root = $('#modal-root');
  root.innerHTML = '';
  const closeAll = () => { backdrop.classList.remove('open'); setTimeout(() => root.innerHTML = '', 160); };
  const backdrop = h('div', { class: 'modal-backdrop', onClick: (e) => { if (e.target === backdrop) closeAll(); } },
    h('div', { class: 'modal ' + (width === 'wide' ? 'wide' : width === 'tall' ? 'tall' : '') },
      h('div', { class: 'modal-head' },
        h('div', { class: 'modal-title' }, title),
        h('button', { class: 'modal-close', onClick: closeAll, html: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' })),
      h('div', { class: 'modal-body' }, body),
      actions.length ? h('div', { class: 'modal-foot' },
        ...actions.map(a => h('button', {
          class: 'btn ' + (a.kind === 'secondary' ? 'btn-outline' : a.kind === 'ghost' ? 'btn-ghost' : a.kind === 'danger' ? 'btn-danger' : ''),
          onClick: async () => {
            try {
              const stop = await a.onClick?.();
              if (stop !== false) closeAll();
            } catch (e) {
              toast('Failed', { sub: e.message, kind: 'error' });
            }
          },
        }, a.label)),
      ) : null));
  root.appendChild(backdrop);
  // next frame to trigger CSS transition
  requestAnimationFrame(() => backdrop.classList.add('open'));
  return { close: closeAll };
}
function confirmDialog({ title, message, confirmLabel = 'Confirm', confirmKind = 'danger' }) {
  return new Promise((resolve) => {
    openModal({
      title,
      body: h('div', { class: 'text-sm', style: { color: 'var(--text-muted)' } }, message),
      actions: [
        { label: 'Cancel', kind: 'secondary', onClick: () => resolve(false) },
        { label: confirmLabel, kind: confirmKind, onClick: () => resolve(true) },
      ],
    });
  });
}

/* ────────────────────────── Add Account modal (tabbed) ──────────────────────────
 * One modal supports every credential type the backend understands:
 *   - Token (one-time / JWT from windsurf.com/editor/show-auth-token)
 *   - API key (raw Codeium api_key)
 *   - Email + password (with optional proxy)
 *   - Refresh token (Firebase refresh, gives long-lived rotation)
 *   - OAuth idToken (advanced: paste a Firebase idToken obtained externally)
 *   - Bulk import (paste a JSON array of any of the above)
 *
 * onAdded() is called after at least one successful add so callers can
 * refresh their lists (Accounts page, Onboarding, etc).
 */
function addAccountModal(onAdded) {
  const TABS = [
    { id: 'token',   label: 'Token' },
    { id: 'session', label: 'Session' },
    { id: 'apikey',  label: 'API key' },
    { id: 'email',   label: 'Email' },
    { id: 'refresh', label: 'Refresh' },
    { id: 'oauth',   label: 'OAuth' },
    { id: 'bulk',    label: 'Bulk' },
  ];

  // Shared state across tab switches so the user doesn't lose what they typed.
  const state = {
    active: 'token',
    token: '', apiKey: '', email: '', password: '',
    refreshToken: '', idToken: '', oauthEmail: '',
    sessionToken: '',
    bulkJson: '',
    label: '',
    useProxy: false,
    proxyHost: '', proxyPort: '8080', proxyType: 'http',
    proxyUser: '', proxyPass: '',
    busy: false,
  };

  const body = h('div', {});

  const renderTab = () => {
    body.innerHTML = '';

    // Segmented tab bar
    const tabsEl = h('div', { class: 'tabs' });
    for (const t of TABS) {
      const el = h('div', {
        class: 'tab' + (state.active === t.id ? ' active' : ''),
        onClick: () => { state.active = t.id; renderTab(); },
      }, t.label);
      tabsEl.appendChild(el);
    }
    body.appendChild(tabsEl);

    // Per-tab content
    if (state.active === 'token')   body.appendChild(renderTokenTab(state));
    if (state.active === 'session') body.appendChild(renderSessionTab(state));
    if (state.active === 'apikey')  body.appendChild(renderApiKeyTab(state));
    if (state.active === 'email')   body.appendChild(renderEmailTab(state));
    if (state.active === 'refresh') body.appendChild(renderRefreshTab(state));
    if (state.active === 'oauth')   body.appendChild(renderOAuthTab(state));
    if (state.active === 'bulk')    body.appendChild(renderBulkTab(state));
  };

  function renderTokenTab(s) {
    const tokenEl = h('textarea', { class: 'textarea', rows: 4, placeholder: 'ott$abc123... or eyJhbGc... (JWT)' });
    tokenEl.value = s.token;
    tokenEl.addEventListener('input', () => s.token = tokenEl.value);
    const labelEl = h('input', { class: 'input', placeholder: 'Optional label (e.g. "personal", "work")' });
    labelEl.value = s.label;
    labelEl.addEventListener('input', () => s.label = labelEl.value);
    return h('div', {},
      h('div', { class: 'alert-info' },
        'Paste a Windsurf auth token. Get one from ',
        h('a', { href: 'https://windsurf.com/editor/show-auth-token', target: '_blank' }, 'windsurf.com/editor/show-auth-token'),
        '. Accepts both ', h('code', {}, 'ott$...'), ' one-time tokens and full JWTs.'),
      h('div', { class: 'field' },
        h('label', { class: 'field-label' }, 'Token'),
        tokenEl),
      h('div', { class: 'field' },
        h('label', { class: 'field-label' }, 'Label (optional)'),
        labelEl));
  }

  function renderSessionTab(s) {
    const tokenEl = h('textarea', { class: 'textarea', rows: 4, placeholder: 'devin-session-token$... or windsurf-session$... or any session cookie' });
    tokenEl.value = s.sessionToken;
    tokenEl.addEventListener('input', () => s.sessionToken = tokenEl.value);
    const labelEl = h('input', { class: 'input', placeholder: 'Optional label' });
    labelEl.value = s.label;
    labelEl.addEventListener('input', () => s.label = labelEl.value);
    return h('div', {},
      h('div', { class: 'alert-info' },
        'Paste a session token from the Windsurf desktop app or browser extension. ',
        'To find it: open Windsurf → Help → Toggle Developer Tools → Application → Local Storage → look for keys containing ',
        h('code', {}, 'session'), ' or ', h('code', {}, 'token'), '. ',
        'Session tokens expire after some time — windbu will mark the account as "expired" when it stops working.'),
      h('div', { class: 'field' },
        h('label', { class: 'field-label' }, 'Session token'),
        tokenEl),
      h('div', { class: 'field' },
        h('label', { class: 'field-label' }, 'Label (optional)'),
        labelEl));
  }

  function renderApiKeyTab(s) {
    const keyEl = h('input', { class: 'input', placeholder: 'Codeium API key (UUID or hex)' });
    keyEl.value = s.apiKey;
    keyEl.addEventListener('input', () => s.apiKey = keyEl.value);
    const labelEl = h('input', { class: 'input', placeholder: 'Optional label' });
    labelEl.value = s.label;
    labelEl.addEventListener('input', () => s.label = labelEl.value);
    return h('div', {},
      h('div', { class: 'alert-warn' },
        h('strong', {}, 'Advanced: '), 'paste a raw ',
        h('code', {}, 'api_key'),
        ' that was already registered with Codeium. The pool will use it as-is — no Firebase refresh, no email lookup. Tier is detected from the first probe.'),
      h('div', { class: 'field' },
        h('label', { class: 'field-label' }, 'API key'),
        keyEl),
      h('div', { class: 'field' },
        h('label', { class: 'field-label' }, 'Label (optional)'),
        labelEl));
  }

  function renderEmailTab(s) {
    const emailEl    = h('input', { class: 'input', type: 'email', placeholder: 'you@example.com' });
    const passwordEl = h('input', { class: 'input', type: 'password', placeholder: '••••••••' });
    const labelEl    = h('input', { class: 'input', placeholder: 'Optional label (defaults to email)' });
    emailEl.value    = s.email;     emailEl.addEventListener('input',    () => s.email = emailEl.value);
    passwordEl.value = s.password;  passwordEl.addEventListener('input', () => s.password = passwordEl.value);
    labelEl.value    = s.label;     labelEl.addEventListener('input',    () => s.label = labelEl.value);
    return h('div', {},
      h('div', { class: 'alert-info' },
        'Sign in to Windsurf directly. windbu will Firebase-authenticate, register with Codeium, and store both the apiKey and refreshToken for long-lived rotation.'),
      h('div', { class: 'field' },
        h('label', { class: 'field-label' }, 'Email'),
        emailEl),
      h('div', { class: 'field' },
        h('label', { class: 'field-label' }, 'Password'),
        passwordEl,
        h('div', { class: 'field-hint' }, 'Stored only briefly to perform the login — windbu keeps the resulting refresh token, not your password.')),
      h('div', { class: 'field' },
        h('label', { class: 'field-label' }, 'Label (optional)'),
        labelEl),
      proxyToggleField(s));
  }

  function renderRefreshTab(s) {
    const rtEl    = h('textarea', { class: 'textarea', rows: 3, placeholder: 'AMf-vBy...' });
    const labelEl = h('input', { class: 'input', placeholder: 'Optional label' });
    rtEl.value    = s.refreshToken; rtEl.addEventListener('input',    () => s.refreshToken = rtEl.value);
    labelEl.value = s.label;        labelEl.addEventListener('input', () => s.label = labelEl.value);
    return h('div', {},
      h('div', { class: 'alert-info' },
        'Import a Firebase ', h('code', {}, 'refresh_token'),
        ' that you obtained externally (e.g. extracted from the Windsurf desktop app DevTools). windbu will rotate it into a fresh idToken + apiKey, then keep refreshing in the background.'),
      h('div', { class: 'field' },
        h('label', { class: 'field-label' }, 'Refresh token'),
        rtEl),
      h('div', { class: 'field' },
        h('label', { class: 'field-label' }, 'Label (optional)'),
        labelEl));
  }

  function renderOAuthTab(s) {
    const idEl    = h('textarea', { class: 'textarea', rows: 3, placeholder: 'eyJhbGc... (Firebase idToken)' });
    const rtEl    = h('textarea', { class: 'textarea', rows: 2, placeholder: 'AMf-vBy... (optional)' });
    const emailEl = h('input', { class: 'input', type: 'email', placeholder: 'Account email (for label/display)' });
    const labelEl = h('input', { class: 'input', placeholder: 'Optional label' });
    idEl.value    = s.idToken;       idEl.addEventListener('input',    () => s.idToken = idEl.value);
    rtEl.value    = s.refreshToken;  rtEl.addEventListener('input',    () => s.refreshToken = rtEl.value);
    emailEl.value = s.oauthEmail;    emailEl.addEventListener('input', () => s.oauthEmail = emailEl.value);
    labelEl.value = s.label;         labelEl.addEventListener('input', () => s.label = labelEl.value);
    return h('div', {},
      h('div', { class: 'alert-warn' },
        h('strong', {}, 'Advanced — for users with an idToken already in hand. '),
        'Sign in to Windsurf via Google/GitHub in your browser, open DevTools → Application → IndexedDB → ',
        h('code', {}, 'firebaseLocalStorageDb'), ' and copy the ', h('code', {}, 'stsTokenManager.accessToken'),
        ' (idToken) and ', h('code', {}, 'stsTokenManager.refreshToken'), '.'),
      h('div', { class: 'field' },
        h('label', { class: 'field-label' }, 'Firebase idToken (required)'),
        idEl),
      h('div', { class: 'field' },
        h('label', { class: 'field-label' }, 'Refresh token (recommended)'),
        rtEl,
        h('div', { class: 'field-hint' }, 'Without it, the account stops working in ~1 hour when the idToken expires.')),
      h('div', { class: 'field' },
        h('label', { class: 'field-label' }, 'Email (optional, for display)'),
        emailEl),
      h('div', { class: 'field' },
        h('label', { class: 'field-label' }, 'Label (optional)'),
        labelEl));
  }

  function renderBulkTab(s) {
    const ta = h('textarea', { class: 'textarea', rows: 12, placeholder:
`[
  { "token": "ott$abc...", "label": "main" },
  { "api_key": "uuid-here", "label": "backup" },
  { "email": "you@example.com", "password": "..." },
  { "refresh_token": "AMf-vBy..." }
]` });
    ta.value = s.bulkJson;
    ta.addEventListener('input', () => s.bulkJson = ta.value);
    return h('div', {},
      h('div', { class: 'alert-info' },
        'Paste a JSON array. Each entry is one of the formats from the other tabs. Errors are reported per-row — successful entries are still saved.'),
      h('div', { class: 'field' },
        h('label', { class: 'field-label' }, 'JSON array'),
        ta));
  }

  function proxyToggleField(s) {
    const wrap = h('div', { class: 'field' });
    const cb = h('input', { type: 'checkbox' });
    cb.checked = s.useProxy;
    const labelRow = h('label', {
      style: { display: 'flex', alignItems: 'center', gap: '8px', cursor: 'pointer', fontSize: '12.5px', color: 'var(--text-muted)' },
    }, cb, 'Route login through proxy');
    wrap.appendChild(labelRow);
    const proxyBox = h('div', {});
    const refreshProxyBox = () => {
      proxyBox.innerHTML = '';
      if (!s.useProxy) return;
      const host = h('input', { class: 'input', placeholder: 'host.example.com' });
      const port = h('input', { class: 'input', placeholder: '8080' });
      const type = h('select', { class: 'select' },
        h('option', { value: 'http' }, 'HTTP'),
        h('option', { value: 'socks5' }, 'SOCKS5'));
      const user = h('input', { class: 'input', placeholder: '(optional)' });
      const pw   = h('input', { class: 'input', type: 'password', placeholder: '(optional)' });
      host.value = s.proxyHost;
      port.value = s.proxyPort;
      type.value = s.proxyType;
      user.value = s.proxyUser;
      pw.value   = s.proxyPass;
      host.addEventListener('input', () => s.proxyHost = host.value);
      port.addEventListener('input', () => s.proxyPort = port.value);
      type.addEventListener('change', () => s.proxyType = type.value);
      user.addEventListener('input', () => s.proxyUser = user.value);
      pw.addEventListener('input', () => s.proxyPass = pw.value);
      proxyBox.appendChild(h('div', { class: 'grid grid-2', style: { marginTop: '8px' } },
        h('div', { class: 'field' }, h('label', { class: 'field-label' }, 'Host'), host),
        h('div', { class: 'field' }, h('label', { class: 'field-label' }, 'Port'), port),
        h('div', { class: 'field' }, h('label', { class: 'field-label' }, 'Type'), type),
        h('div', {}),
        h('div', { class: 'field' }, h('label', { class: 'field-label' }, 'Username'), user),
        h('div', { class: 'field' }, h('label', { class: 'field-label' }, 'Password'), pw)));
    };
    cb.addEventListener('change', () => { s.useProxy = cb.checked; refreshProxyBox(); });
    wrap.appendChild(proxyBox);
    refreshProxyBox();
    return wrap;
  }

  // ── Submit handler ────────────────────────────────
  async function submit() {
    state.busy = true;
    const proxy = state.useProxy && state.proxyHost
      ? { host: state.proxyHost.trim(), port: parseInt(state.proxyPort, 10) || 8080, type: state.proxyType,
          username: state.proxyUser || '', password: state.proxyPass || '' }
      : undefined;

    try {
      if (state.active === 'token') {
        const v = state.token.trim();
        if (!v) return validationFail('Paste a token');
        await postSingle({ token: v, label: state.label.trim() || undefined });
      } else if (state.active === 'session') {
        const v = state.sessionToken.trim();
        if (!v) return validationFail('Paste a session token');
        await postSingle({ token: v, label: state.label.trim() || undefined });
      } else if (state.active === 'apikey') {
        const v = state.apiKey.trim();
        if (!v) return validationFail('Paste an API key');
        await postSingle({ api_key: v, label: state.label.trim() || undefined });
      } else if (state.active === 'email') {
        if (!state.email.trim() || !state.password) return validationFail('Enter email and password');
        await postSingle({ email: state.email.trim(), password: state.password, label: state.label.trim() || undefined, proxy });
      } else if (state.active === 'refresh') {
        const v = state.refreshToken.trim();
        if (!v) return validationFail('Paste a refresh token');
        await postSingle({ refresh_token: v, label: state.label.trim() || undefined });
      } else if (state.active === 'oauth') {
        const v = state.idToken.trim();
        if (!v) return validationFail('Paste a Firebase idToken');
        await postSingle({
          id_token: v,
          refresh_token: state.refreshToken.trim() || undefined,
          email: state.oauthEmail.trim() || undefined,
          label: state.label.trim() || undefined,
        });
      } else if (state.active === 'bulk') {
        const raw = state.bulkJson.trim();
        if (!raw) return validationFail('Paste a JSON array');
        let parsed;
        try { parsed = JSON.parse(raw); }
        catch (e) { return validationFail('Invalid JSON: ' + e.message); }
        if (!Array.isArray(parsed)) return validationFail('JSON must be an array');
        await postBulk(parsed);
      }
    } catch (e) {
      toast('Failed', { sub: e.message, kind: 'error' });
      return false;
    } finally {
      state.busy = false;
    }
  }

  function validationFail(msg) { toast(msg, { kind: 'warn' }); return false; }

  async function postSingle(payload) {
    const r = await api.post('/accounts', payload);
    toast('Account added: ' + (r.account?.email || 'ok'));
    if (typeof onAdded === 'function') onAdded();
  }

  async function postBulk(accounts) {
    const r = await api.post('/accounts', { accounts });
    const ok = r.results.filter(x => x.ok).length;
    const fail = r.results.length - ok;
    // Stay open and show per-row results so the user can see which lines failed.
    const summary = h('div', {},
      h('div', { class: ok > 0 ? 'alert-info' : 'alert-warn' },
        h('strong', {}, `${ok} added, ${fail} failed`)),
      h('div', { class: 'batch-result' },
        ...r.results.map(row => h('div', {
          class: 'batch-result-row ' + (row.ok ? 'ok' : 'fail'),
        }, h('span', { class: 'bullet' }, row.ok ? '✓' : '✗'),
            h('span', {}, row.ok ? `${row.email} (id=${row.id}, ${row.method})` : `${row.hint || ''} — ${row.error}`)))));
    body.innerHTML = '';
    body.appendChild(summary);
    if (ok > 0 && typeof onAdded === 'function') onAdded();
    // Return false to keep the modal open; user closes it manually.
    return false;
  }

  renderTab();

  openModal({
    title: 'Add account',
    width: 'wide',
    body,
    actions: [

/* ────────────────────────── App (router + state) ────────────────────────── */
const App = {
  page: 'overview',
  overviewTimer: null,
  footerTimer: null,
  logsStreamController: null,

  async boot() {
    // Decide between login / onboarding / app
    try {
      const auth = await api.get('/auth').catch(e => { throw e; });
      if (!auth.required) {
        // no password needed → straight to onboarding or app
        this.token = '';
        await this.decideStartScreen();
        return;
      }
      if (!api.token) return this.showLogin();
      // have cached token → verify by pinging overview
      try { await api.get('/overview'); }
      catch (e) {
        if (e.status === 401) { api.token = ''; localStorage.removeItem('windbu-dashboard-token'); return this.showLogin(); }
        throw e;
      }
      await this.decideStartScreen();
    } catch (e) {
      $('#overlay').classList.remove('hidden');
      $('#overlay-content').innerHTML = '';
      $('#overlay-content').appendChild(h('div', {},
        h('div', { class: 'brand-row' }, h('div', { class: 'brand-mark' }, 'w'), h('div', {}, h('div', { class: 'brand-name' }, 'windbu'), h('div', { class: 'brand-sub' }, 'local gateway'))),
        h('div', { class: 'login-title' }, 'Cannot reach gateway'),
        h('div', { class: 'login-desc' }, e.message),
        h('button', { class: 'btn', onClick: () => location.reload() }, 'Retry'),
      ));
    }
  },

  async decideStartScreen() {
    // If no accounts exist, show onboarding. Otherwise launch app.
    const counts = (await api.get('/overview')).accounts;
    if (!counts || counts.total === 0) {
      await this.showOnboarding();
    } else {
      await this.launchApp();
    }
  },

  showLogin() {
    $('#overlay').classList.remove('hidden');
    $('#app').classList.add('hidden');
    const content = $('#overlay-content');
    content.innerHTML = '';
    const input = h('input', { class: 'input', type: 'password', placeholder: 'Dashboard password', autofocus: true });
    const submit = async () => {
      const pw = input.value.trim();
      if (!pw) return;
      api.token = pw;
      try {
        await api.get('/overview');
        localStorage.setItem('windbu-dashboard-token', pw);
        toast('Signed in');
        await this.decideStartScreen();
      } catch (e) {
        if (e.status === 401) {
          api.token = '';
          toast('Invalid password', { kind: 'error' });
          input.value = '';
          input.focus();
        } else {
          toast('Failed', { sub: e.message, kind: 'error' });
        }
      }
    };
    content.appendChild(h('div', {},
      h('div', { class: 'brand-row' }, h('div', { class: 'brand-mark' }, 'w'), h('div', {},
        h('div', { class: 'brand-name' }, 'windbu'),
        h('div', { class: 'brand-sub' }, 'local gateway'))),
      h('div', { class: 'login-title' }, 'Sign in'),
      h('div', { class: 'login-desc' }, 'Enter the dashboard password. You can find it in ~/.windbu/credentials.txt.'),
      h('div', { class: 'field' },
        input),
      h('button', { class: 'btn', style: { width: '100%', justifyContent: 'center' }, onClick: submit }, 'Continue'),
    ));
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
    input.focus();
  },

  async showOnboarding() {
    $('#overlay').classList.remove('hidden');
    $('#app').classList.add('hidden');
    const content = $('#overlay-content');
    content.innerHTML = '';
    const state = { step: 0, token: '', label: '' };
    const render = () => {
      content.innerHTML = '';
      content.appendChild(this.renderOnboardingStep(state, render));
    };
    render();
  },

  renderOnboardingStep(state, render) {
    const steps = [
      {
        title: 'Welcome to windbu',
        desc: 'One OpenAI/Anthropic endpoint over multiple Windsurf accounts. Let\'s get you set up in a minute.',
        body: () => h('div', { class: 'mt-12' },
          h('div', { class: 'kv' }, h('span', {}, 'Dashboard'), h('span', { class: 'mono' }, location.host)),
          h('div', { class: 'kv' }, h('span', {}, 'Config'), h('span', { class: 'mono' }, '~/.windbu/')),
          h('div', { class: 'kv' }, h('span', {}, 'API endpoint'), h('span', { class: 'mono' }, `http://${location.host}/v1`)),
        ),
        actions: [{ label: 'Get started →', onClick: () => { state.step++; render(); return false; } }],
      },
      {
        title: 'Add your first account',
        desc: 'A Windsurf account powers the gateway. The fastest way is to paste a token, but you can also sign in with email/password or import an API key.',
        body: () => {
          const wrap = h('div', {});
          const tokenInput = h('textarea', { class: 'textarea', placeholder: 'ott$... or JWT', rows: 4 });
          const labelInput = h('input', { class: 'input', placeholder: 'Label (optional)' });
          tokenInput.value = state.token;
          labelInput.value = state.label;
          tokenInput.addEventListener('input', () => state.token = tokenInput.value);
          labelInput.addEventListener('input', () => state.label = labelInput.value);
          wrap.appendChild(h('div', { class: 'field' },
            h('label', { class: 'field-label' }, 'Windsurf token (recommended)'),
            tokenInput,
            h('div', { class: 'field-hint' },
              h('a', { href: 'https://windsurf.com/editor/show-auth-token', target: '_blank' }, 'Open windsurf.com →'),
              ' — copy the ott$ or JWT token, paste here')));
          wrap.appendChild(h('div', { class: 'field' },
            h('label', { class: 'field-label' }, 'Label'),
            labelInput));
          wrap.appendChild(h('div', { class: 'field-hint', style: { textAlign: 'center', marginTop: '14px' } },
            h('a', { href: '#', onClick: (ev) => {
              ev.preventDefault();
              addAccountModal(async () => {
                // After at least one account is added, advance to the success step.
                state.step = 2;
                render();
              });
            } }, 'Or sign in with email / API key / OAuth →')));
          return wrap;
        },
        actions: [
          { label: 'Skip for now', kind: 'ghost', onClick: async () => { await this.launchApp(); return false; } },
          { label: 'Add account', onClick: async () => {
            if (!state.token.trim()) { toast('Please paste a token', { kind: 'warn' }); return false; }
            try {
              const r = await api.post('/accounts', { token: state.token.trim(), label: state.label.trim() || undefined });
              toast(`Account added: ${r.account?.email || 'ok'}`);
              state.step++;
              render();
              return false;
            } catch (e) { toast('Failed to add', { sub: e.message, kind: 'error' }); return false; }
          } },
        ],
      },
      {
        title: 'You\'re all set',
        desc: 'The gateway is live. Point any OpenAI-compatible client at it and start using Windsurf models.',
        body: () => h('div', {},
          h('div', { class: 'kv' }, h('span', {}, 'Endpoint'),
            h('span', { class: 'mono copyable', onClick: copyEndpoint }, `http://${location.host}/v1`)),
          h('div', { class: 'kv' }, h('span', {}, 'Models'), h('span', {}, 'Use /v1/models')),
          h('div', { class: 'field-hint mt-8' }, 'Next: open Accounts for pool status, Usage for analytics.'),
        ),
        actions: [{ label: 'Enter dashboard', onClick: async () => { await this.launchApp(); return false; } }],
      },
    ];
    function copyEndpoint() {
      navigator.clipboard.writeText(`http://${location.host}/v1`).then(() => toast('Copied'));
    }
    const s = steps[state.step];
    return h('div', {},
      h('div', { class: 'brand-row' }, h('div', { class: 'brand-mark' }, 'w'), h('div', {},
        h('div', { class: 'brand-name' }, 'windbu'),
        h('div', { class: 'brand-sub' }, `Step ${state.step + 1} of ${steps.length}`))),
      h('div', { class: 'login-title' }, s.title),
      h('div', { class: 'login-desc' }, s.desc),
      s.body(),
      h('div', { class: 'row', style: { justifyContent: 'flex-end', gap: '8px', marginTop: '18px' } },
        ...s.actions.map(a => h('button', {
          class: 'btn ' + (a.kind === 'ghost' ? 'btn-ghost' : a.kind === 'secondary' ? 'btn-outline' : ''),
          onClick: async () => {
            try {
              const stop = await a.onClick();
              if (stop !== false) {/* nothing yet */}
            } catch (e) { toast('Error', { sub: e.message, kind: 'error' }); }
          },
        }, a.label))),
    );
  },

  async launchApp() {
    $('#overlay').classList.add('hidden');
    $('#app').classList.remove('hidden');
    this.renderNav();
    this.startFooter();
    // route from hash
    const initial = (location.hash || '#/overview').replace(/^#\//, '');
    await this.goto(NAV.flatMap(g => g.items).some(i => i.id === initial) ? initial : 'overview');
    window.addEventListener('hashchange', () => {
      const id = (location.hash || '#/overview').replace(/^#\//, '');
      if (id !== this.page && NAV.flatMap(g => g.items).some(i => i.id === id)) {
        this.goto(id);
      }
    });
    $('#btn-logout').addEventListener('click', async () => {
      if (!await confirmDialog({
        title: 'Log out of the dashboard?',
        message: 'Your accounts and settings stay safe in ~/.windbu/. You\'ll need the dashboard password to log back in.',
        confirmLabel: 'Log out',
        confirmKind: 'danger',
      })) return;
      localStorage.removeItem('windbu-dashboard-token');
      api.token = '';
      location.reload();
    });
  },

  renderNav() {
    const nav = $('#nav');
    nav.innerHTML = '';
    for (const grp of NAV) {
      nav.appendChild(h('div', { class: 'nav-group' },
        h('div', { class: 'nav-group-label' }, grp.group),
        ...grp.items.map(item => {
          const el = h('div', {
            class: 'nav-item' + (this.page === item.id ? ' active' : ''),
            onClick: () => { location.hash = '#/' + item.id; this.goto(item.id); },
          },
            h('span', { html: ICON[item.icon] || '' }),
            h('span', {}, item.label),
            item.badge ? h('span', { class: 'nav-badge ' + (item.badgeKind || '') }, item.badge) : null,
          );
          el.dataset.id = item.id;
          return el;
        })));
    }
  },

  setActive(id) {
    $$('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  },

  async goto(id) {
    this.page = id;
    this.setActive(id);
    const page = PAGES[id];
    if (!page) { $('#content').innerHTML = '<div class="text-dim">Unknown page</div>'; return; }
    $('#page-title').textContent = page.title;
    $('#page-sub').textContent = page.sub || '';
    $('#page-actions').innerHTML = '';
    $('#content').innerHTML = '';
    // cleanup previous page timers / streams
    clearInterval(this.overviewTimer); this.overviewTimer = null;
    this.logsStreamController?.close?.(); this.logsStreamController = null;
    try { await page.render(); }
    catch (e) {
      $('#content').innerHTML = '';
      $('#content').appendChild(h('div', { class: 'card' }, h('div', { class: 'text-dim' }, 'Failed to load: ' + e.message)));
    }
  },

  startFooter() {
    const tick = async () => {
      try {
        const o = await api.get('/overview');
        $('#brand-version').textContent = 'v' + (o.version || '—');
        $('#foot-health').innerHTML = `<span class="badge ok"><span class="badge-dot"></span>up</span>`;
        $('#foot-uptime').textContent = fmtUptime(o.uptime);
        $('#foot-accounts').textContent = `${o.accounts?.active ?? 0}/${o.accounts?.total ?? 0}`;
      } catch (e) {
        $('#foot-health').innerHTML = `<span class="badge error"><span class="badge-dot"></span>down</span>`;
      }
    };
    tick();
    this.footerTimer = setInterval(tick, 15000);
  },
};
